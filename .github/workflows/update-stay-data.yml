name: 숙소 수요 데이터 일일 업데이트

on:
  schedule:
    - cron: '0 21 * * *'  # 매일 오전 6시 KST (= UTC 21:00)
  workflow_dispatch:       # 수동 실행 가능

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch stay data from Naver API
        env:
          NAVER_API_ID: ${{ secrets.NAVER_API_ID }}
          NAVER_API_SECRET: ${{ secrets.NAVER_API_SECRET }}
        run: node scripts/fetch-stay-data.js
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stay-cache.json
          git diff --staged --quiet || git commit -m "chore: 숙소 수요 데이터 일일 업데이트 $(date +'%Y-%m-%d')"
          git push
